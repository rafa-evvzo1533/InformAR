workflows:
  ios-workflow:
    name: InformAR iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - apple_auth # Aquí irán tus credenciales de Apple luego
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Build shared module
        script: |
          ./gradlew :shared:assembleSharedReleaseFramework
      - name: Build iOS app
        script: |
          xcodebuild build -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
